name: Auto-Clean

on:
  #自动清理：每晚11点，默认为utc时间，北京时间需要减去8
  schedule:
    - cron: '0 15 1/5 * *'
  #手动清理
  workflow_dispatch:
    inputs:
      NUMBER:
        default: '4'
        required: false
        type: string

permissions: write-all

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

jobs:
  auto_clean:
    runs-on: ubuntu-latest
    steps:
      # 👇 新增：必须先 checkout，告诉 gh 命令这是在哪个仓库
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Delete Old Releases
        uses: dev-drprasad/delete-older-releases@master
        with:
          keep_latest: ${{inputs.NUMBER || '5'}}
          delete_tags: true

      - name: Delete Old Workflows
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: ${{inputs.NUMBER || '5'}}

      # 👇 新增：清理 GitHub Actions 所有的缓存
      - name: Delete All Caches
        run: |
          echo "正在清理 GitHub 仓库中的所有缓存文件..."
          gh cache delete --all || echo "未找到现有缓存或清理跳过"
