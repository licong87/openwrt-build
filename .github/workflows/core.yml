name: WRT-CORE

on:
  workflow_call:
    inputs:
      TARGET:
        required: true
        type: string
      REPO_SOURCE:
        required: true
        type: string
      REPO_URL:
        required: true
        type: string
      REPO_BRANCH:
        required: true
        type: string
      CONFIG_FILE:
        required: true
        type: string

env:
  TARGET: ${{inputs.TARGET}}
  REPO_SOURCE: ${{inputs.REPO_SOURCE}}
  REPO_URL: ${{inputs.REPO_URL}}
  REPO_BRANCH: ${{inputs.REPO_BRANCH}}
  CONFIG_FILE: ${{inputs.CONFIG_FILE}}
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 🧹 Free Disk
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        swap-storage: true

    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: ⚙️ Init Env
      run: |
        sudo apt update -y
        sudo apt install -y \
        build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses-dev libssl-dev python3 python3-distutils \
        rsync unzip zlib1g-dev file wget libelf-dev autoconf automake \
        libtool pkg-config texinfo

        sudo timedatectl set-timezone "$TZ"

        sudo mkdir -p /workdir
        sudo chown runner:runner /workdir

    - name: 📦 Clone Source
      working-directory: /workdir
      run: |
        git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        cd openwrt
        echo "WRT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV

    - name: 📡 Update Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: ⚙️ Load Config
      run: |
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        cd openwrt
        make defconfig

    # =========================
    # 🔥 核心修复：libffi 自动补丁
    # =========================
    - name: 🔧 Fix libffi (Auto)
      run: |
        cd openwrt
        echo "==> fixing libffi"

        make package/libffi/download V=s

        LIBFFI_DIR=$(find build_dir -type d -name "libffi-*" | head -n 1)

        if [ -n "$LIBFFI_DIR" ]; then
          make package/libffi/{clean,compile} V=s || true

          FFICONFIG=$(find $LIBFFI_DIR -name fficonfig.h | head -n 1)

          if [ -f "$FFICONFIG" ]; then
            mkdir -p $LIBFFI_DIR/ipkg-install/usr/include
            cp -f $FFICONFIG $LIBFFI_DIR/ipkg-install/usr/include/
            echo "✔ libffi fixed"
          else
            echo "⚠️ fficonfig.h not found but continue"
          fi
        fi

    - name: 📦 Download
      run: |
        cd openwrt
        make download -j8

    - name: 🚀 Compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 || make -j1 V=s

        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV

    - name: 📁 Organize
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages

        TIMESTAMP=$(date +"%y.%m.%d-%H.%M.%S")

        for file in *; do
          [ -f "$file" ] || continue
          base="${file%%.*}"
          ext="${file#*.}"

          if [ "$base" == "$file" ]; then
            mv "$file" "${file}-${TIMESTAMP}"
          else
            mv "$file" "${base}-${TIMESTAMP}.${ext}"
          fi
        done

        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    - name: 📦 Plugin List
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt
        echo "PLUGIN_BODY<<EOF" >> $GITHUB_ENV
        echo "### 📦 插件列表：" >> $GITHUB_ENV
        grep "CONFIG_PACKAGE_luci-app-" .config | grep "=y" | cut -d'=' -f1 | sed 's/CONFIG_PACKAGE_//g' >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: 🚀 Release
      uses: softprops/action-gh-release@v2
      if: steps.compile.outputs.status == 'success'
      with:
        tag_name: ${{env.TARGET}}_${{env.FILE_DATE}}
        files: ${{ env.FIRMWARE }}/*
        body: |
          🌐 默认地址：192.168.1.1
          🔑 默认密码：无

          ⚙️ 平台：${{env.TARGET}}
          📦 源码：${{env.REPO_URL}}
          🌿 分支：${{env.REPO_BRANCH}}
          🧬 提交：${{env.WRT_HASH}}
          🕒 时间：${{env.DATE}}

          ${{env.PLUGIN_BODY}}
