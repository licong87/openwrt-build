name: WRT-CORE

on:
  workflow_call:
    inputs:
      TARGET:
        required: true
        type: string
      REPO_SOURCE:
        required: true
        type: string
      REPO_URL:
        required: true
        type: string
      REPO_BRANCH:
        required: true
        type: string
      FEEDS_CONF:
        required: true
        type: string
      CONFIG_FILE:
        required: true
        type: string

env:
  TARGET: ${{inputs.TARGET}}
  REPO_SOURCE: ${{inputs.REPO_SOURCE}}
  REPO_URL: ${{inputs.REPO_URL}}
  REPO_BRANCH: ${{inputs.REPO_BRANCH}}
  FEEDS_CONF: ${{inputs.FEEDS_CONF}}
  CONFIG_FILE: ${{inputs.CONFIG_FILE}}
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt -yqq update
          sudo -E apt -yqq full-upgrade
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          
          # ✅ [核心修改 1] 安装 eBPF 必备编译器 clang 和 llvm
          sudo -E apt -yqq install dos2unix libfuse-dev clang llvm          
          
          # ✅ [核心修改 2] 调用本地 scripts 目录的脚本 (严格匹配全小写 scripts)
          sudo bash $GITHUB_WORKSPACE/scripts/init_build_environment.sh
          
          sudo timedatectl set-timezone "$TZ"
          git config --global user.email "aa@163.com"
          git config --global user.name "aa"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Clone source code
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
          cd openwrt
          echo "WRT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

      - name: Cache
        uses: stupidloud/cachewrtbuild@main
        with:
          ccache: true
          mixkey: ${{env.REPO_SOURCE}}-${{env.REPO_BRANCH}}-${{env.WRT_HASH}}
          prefix: ${{ env.OPENWRT_PATH }}

      - name: Update Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a        

      - name: Check Scripts
        run: |
          find ./ -maxdepth 3 -type f -iregex ".*\(txt\|sh\)$" -exec dos2unix {} \; -exec chmod +x {} \;

      - name: Custom Packages
        run: |
          cd ./openwrt/package/
          # ✅ [核心修改 3] 这里已经全部改成了小写的 scripts
          $GITHUB_WORKSPACE/scripts/Packages.sh
          $GITHUB_WORKSPACE/scripts/Handles.sh

      - name: Custom Settings
        run: |
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          cd ./openwrt
          # ✅ [核心修改 3] 这里也改成了小写的 scripts
          $GITHUB_WORKSPACE/scripts/Settings.sh          

      - name: Download package
        id: package
        run: |
          cd openwrt
          make defconfig
          
          # ✅ [核心修改 4] 强制启用 BPF + LLVM 并修复占位符路径
          sed -i 's/# CONFIG_USE_LLVM is not set/CONFIG_USE_LLVM=y/g' .config
          sed -i 's/# CONFIG_BPF_TOOLCHAIN is not set/CONFIG_BPF_TOOLCHAIN=y/g' .config
          sed -i 's|CONFIG_CLANG_PATH=.*|CONFIG_CLANG_PATH="/usr/bin/clang"|g' .config
          grep -q CONFIG_CLANG_PATH .config || echo 'CONFIG_CLANG_PATH="/usr/bin/clang"' >> .config
          
          # 再次生成配置以应用刚才的修改
          make defconfig
          
          # 打印验证信息，方便排错
          which clang
          clang --version
          
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile the firmware
        id: compile
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          # ✅ [核心修改 5] 强行指定内核编译使用 LLVM
          export LLVM=1
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
          echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV          

      - name: Organize files
        id: organize
        if: steps.compile.outputs.status == 'success'  && !cancelled()
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Generate Plugin List
        id: plugins
        if: steps.compile.outputs.status == 'success' && !cancelled()
        run: |
          cd openwrt
          echo "PLUGIN_BODY<<EOF" >> $GITHUB_ENV
          echo "### 📦 已集成的 luci-app 插件列表：" >> $GITHUB_ENV
          grep "CONFIG_PACKAGE_luci-app-" .config | grep "=y" | cut -d'=' -f1 | sed 's/CONFIG_PACKAGE_//g' >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Release Firmware
        uses: softprops/action-gh-release@v2
        if: steps.compile.outputs.status == 'success' && !cancelled()
        with:
          tag_name: ${{env.TARGET}}_${{env.FILE_DATE}}
          files: ${{ env.FIRMWARE }}/*
          body: |
            云编译openwrt固件。
            
            源码：${{env.REPO_URL}}
            分支：${{env.REPO_BRANCH}}
            平台：${{env.TARGET}}
            
            ${{env.PLUGIN_BODY}}
