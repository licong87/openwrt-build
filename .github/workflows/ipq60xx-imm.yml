#CI项目
name: ipq60xx-libWrt

#CI计划
on:
  # 手动执行
  workflow_dispatch:
  # 每月1号北京时间早上8点执行 (UTC 00:00)
  schedule:
    - cron: '0 0 1 * *'

#CI权限
permissions: write-all

#CI任务
jobs:
  config:
    name: ${{matrix.TARGET}}
    strategy:
      fail-fast: false
      #max-parallel: 3
      matrix:
        include:
          - TARGET: ipq60xx-libWrt-nowifi-ress01
            CONFIG_FILE: nowifi-ress01.config
          - TARGET: ipq60xx-libWrt-nowifi-znm2
            CONFIG_FILE: nowifi-znm2.config
          - TARGET: ipq60xx-libWrt-wifi-ress01
            CONFIG_FILE: wifi-ress01.config

    #调用公用编译核心WRT-CORE.yml
    uses: ./.github/workflows/core.yml
    with:
      #编译平台
      TARGET: ${{matrix.TARGET}}
      #源码
      REPO_SOURCE: immortalwrt
      #源码地址
      REPO_URL: https://github.com/immortalwrt/immortalwrt
      #源码分支
      REPO_BRANCH: master
      #软件源
      FEEDS_CONF: feeds.conf.default
      #配置文件
      CONFIG_FILE: ./config/libWrt/${{matrix.CONFIG_FILE}}     
