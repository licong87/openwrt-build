#CI项目
name: ipq60xx-official-immortal

#CI计划
on:
  # 手动执行
  workflow_dispatch:
  # 默认为utc时间，北京时间需要减去8
  schedule:
    - cron: 0 14 1/7 * *

#CI权限
permissions: write-all

#CI任务
jobs:
  config:
    name: ${{matrix.TARGET}}
    strategy:
      fail-fast: false
      matrix:
        include:
          - TARGET: ipq60xx-official-nowifi
            CONFIG_FILE: nowifi.config
          - TARGET: ipq60xx-official-wifi
            CONFIG_FILE: wifi.config

    #调用公用编译核心WRT-CORE.yml
    uses: ./.github/workflows/core.yml
    with:
      #编译平台
      TARGET: ${{matrix.TARGET}}
      #源码
      REPO_SOURCE: immortalwrt
      #源码地址（完全对标官方地址）
      REPO_URL: https://github.com/immortalwrt/immortalwrt
      #源码分支（完全对标 master）
      REPO_BRANCH: master
      #软件源
      FEEDS_CONF: feeds.conf.default
      #配置文件路径
      CONFIG_FILE: ./config/imm/${{matrix.CONFIG_FILE}}
